<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizz Assist</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f5f8;--surface:#fff;--surface2:#f0eeff;--accent:#6c5ce7;--accent-light:#a29bfe;
  --green:#00b894;--green-bg:#e6f9f3;--red:#e74c3c;--red-bg:#fef0ef;--yellow:#f39c12;--yellow-bg:#fef8ec;
  --text:#1a1a2e;--text2:#555;--muted:#999;--border:#e8e8ee;--radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:480px;margin:0 auto;padding:12px;min-height:100vh;display:flex;flex-direction:column;}

.header{background:var(--surface);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px;border:1px solid var(--border);}
.header-icon{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-light));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:600;flex-shrink:0;}
.header h1{font-size:16px;font-weight:600;}
.header p{font-size:11px;color:var(--muted);margin-top:1px;}
.header-btns{margin-left:auto;display:flex;gap:6px;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);transition:all .2s;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
.icon-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;display:none;animation:slideDown .2s ease;}
.panel.show{display:block;}
.panel-title{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}
.field{margin-bottom:8px;}
.field label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field input::placeholder,.field textarea::placeholder{color:#bbb;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.profile-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;}
.profile-header:hover{background:var(--bg);}
.profile-avatar{width:36px;height:36px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:var(--accent);flex-shrink:0;}
.profile-header .name{font-size:14px;font-weight:500;}
.profile-header .style-badge{font-size:10px;padding:3px 8px;border-radius:12px;background:var(--surface2);color:var(--accent);font-weight:500;margin-left:auto;}
.profile-body{padding:0 14px 12px;display:none;border-top:1px solid var(--border);padding-top:10px;}
.profile-body.show{display:block;}
.trait-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;}
.trait-label{color:var(--muted);min-width:80px;}
.trait-value{color:var(--text);font-weight:500;}
.trait-bar{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;max-width:80px;}
.trait-fill{height:100%;border-radius:2px;background:var(--accent);}
.profile-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.tag{font-size:10px;padding:3px 8px;border-radius:10px;background:var(--bg);color:var(--text2);border:1px solid var(--border);}

.chat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);flex:1;display:flex;flex-direction:column;min-height:0;margin-bottom:10px;}
.chat-history{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;min-height:160px;max-height:38vh;background:var(--bg);border-radius:var(--radius) var(--radius) 0 0;}
.msg{max-width:82%;padding:10px 14px;font-size:13px;line-height:1.5;word-wrap:break-word;}
.msg.her{align-self:flex-start;background:var(--surface);border-radius:16px 16px 16px 4px;border:1px solid var(--border);}
.msg.you{align-self:flex-end;background:var(--accent);color:#fff;border-radius:16px 16px 4px 16px;}
.msg.system{align-self:center;background:var(--surface2);color:var(--accent);font-size:11px;padding:5px 12px;border-radius:20px;}
.msg-time{font-size:10px;margin-top:3px;}
.msg.her .msg-time{color:var(--muted);}
.msg.you .msg-time{color:rgba(255,255,255,.55);}

.input-area{padding:10px 12px;border-top:1px solid var(--border);}
.sender-toggle{display:flex;gap:6px;margin-bottom:8px;}
.sender-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;}
.sender-btn.active-her{background:var(--surface2);color:var(--accent);border-color:var(--accent-light);}
.sender-btn.active-you{background:var(--accent);color:#fff;border-color:var(--accent);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.input-row textarea{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:10px;font-size:13px;resize:none;font-family:inherit;outline:none;min-height:42px;max-height:110px;line-height:1.5;}
.input-row textarea:focus{border-color:var(--accent);}
.input-row textarea::placeholder{color:#bbb;}
.send-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;background:var(--accent);color:#fff;font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;}
.send-btn:hover{background:#5b4bd6;transform:scale(1.05);}

.actions{display:flex;gap:6px;margin-top:8px;}
.action-btn{flex:1;padding:9px 6px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;text-align:center;font-family:inherit;}
.action-btn:hover:not(:disabled){transform:translateY(-1px);}
.action-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.action-btn.suggest{color:var(--green);border-color:#c3ede2;}
.action-btn.suggest:hover:not(:disabled){background:var(--green-bg);}
.action-btn.redflag{color:var(--red);border-color:#f5c6c0;}
.action-btn.redflag:hover:not(:disabled){background:var(--red-bg);}
.action-btn.rewrite{color:var(--yellow);border-color:#f5dfa8;}
.action-btn.rewrite:hover:not(:disabled){background:var(--yellow-bg);}

.ai-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;display:none;animation:slideUp .25s ease;}
.ai-panel.show{display:block;}
.ai-panel-header{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;color:var(--accent);}
.ai-suggestion{background:var(--bg);border-radius:10px;padding:11px 13px;margin-bottom:6px;font-size:13px;line-height:1.5;cursor:pointer;border:1px solid var(--border);transition:all .2s;}
.ai-suggestion:hover{border-color:var(--accent);background:var(--surface2);}
.ai-suggestion:last-child{margin-bottom:0;}
.ai-suggestion .label{font-size:10px;color:var(--accent);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}
.ai-suggestion .copy-btn{display:inline-block;margin-top:8px;padding:4px 12px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:500;border:none;cursor:pointer;transition:all .15s;}
.ai-suggestion .copy-btn:hover{background:#5b4bd6;}
.ai-suggestion .copy-btn.copied{background:var(--green);}
.red-flag-item{padding:9px 12px;margin-bottom:5px;border-radius:8px;font-size:13px;line-height:1.5;border-radius:8px 8px 8px 8px;}
.red-flag-item.warn{background:var(--red-bg);border-left:3px solid var(--red);color:#8b2020;border-radius:0 8px 8px 0;}
.red-flag-item.ok{background:var(--green-bg);border-left:3px solid var(--green);color:#0a6e5a;border-radius:0 8px 8px 0;}
.red-flag-item.neutral{background:var(--bg);color:var(--text2);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border-radius:16px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative;}
.modal h2{font-size:18px;font-weight:600;margin-bottom:4px;}
.modal .subtitle{font-size:13px;color:var(--muted);margin-bottom:16px;}
.modal textarea{min-height:120px;}
.modal .btn-row{display:flex;gap:8px;margin-top:16px;}
.modal-close{position:absolute;top:12px;right:14px;width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);transition:all .2s;}
.modal-close:hover{border-color:var(--red);color:var(--red);}
.btn{padding:10px 20px;border-radius:10px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover:not(:disabled){background:#5b4bd6;}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--surface2);}
.btn-full{width:100%;}

.loading{text-align:center;padding:20px;color:var(--muted);font-size:13px;}
.loading .dots::after{content:'';animation:dots 1.4s infinite;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.clear-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;}
.clear-btn:hover{background:var(--red-bg);}
.custom-url-row{display:none;}.custom-url-row.show{display:block;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
@keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.profile-switcher{display:flex;align-items:center;gap:6px;margin-bottom:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;}
.profile-switcher select{flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.profile-switcher select:focus{border-color:var(--accent);}
.switcher-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);transition:all .2s;flex-shrink:0;}
.switcher-btn:hover{border-color:var(--accent);color:var(--accent);}
.switcher-btn.danger:hover{border-color:var(--red);color:var(--red);}

.dark{--bg:#121218;--surface:#1a1a24;--surface2:#252536;--accent:#8b7cf7;--accent-light:#a29bfe;
  --green:#00d9a3;--green-bg:#0a2e24;--red:#ff6b6b;--red-bg:#2e1515;--yellow:#ffc048;--yellow-bg:#2e2510;
  --text:#e8e8f0;--text2:#aaa;--muted:#777;--border:#2a2a3a;--radius:12px;}
.dark .msg.her{background:var(--surface2);border-color:var(--border);color:var(--text);}
.dark .field input,.dark .field select,.dark .field textarea{background:var(--surface);color:var(--text);border-color:var(--border);}
.dark .modal{background:var(--surface);}
.dark .modal-overlay{background:rgba(0,0,0,.7);}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-icon">R</div>
    <div>
      <h1>Rizz Assist</h1>
      <p id="headerSub">Your dating wingman AI</p>
    </div>
    <div class="header-btns">
      <button class="icon-btn" onclick="toggleDarkMode()" id="btnDark" title="Dark mode">&#9790;</button>
      <button class="icon-btn" onclick="handleProfileBtn()" id="btnProfile" title="Her Profile">&#9829;</button>
      <button class="icon-btn" onclick="toggleSettings()" id="btnSettings" title="Settings">&#9881;</button>
    </div>
  </div>


  <div class="profile-switcher" id="profileSwitcher" style="display:none;">
    <select id="profileSelect" onchange="switchProfile()"></select>
    <button class="switcher-btn" onclick="addNewProfile()" title="Add new girl">+</button>
    <button class="switcher-btn danger" onclick="deleteCurrentProfile()" title="Delete this profile">&times;</button>
  </div>

  <div class="panel" id="settingsPanel">
    <div class="panel-title">API Settings</div>
    <div class="grid2">
      <div class="field"><label>Provider</label><select id="provider"><option value="openai">OpenAI</option><option value="deepseek">DeepSeek</option><option value="claude">Claude (Anthropic)</option><option value="bedrock">Claude (AWS Bedrock)</option><option value="custom">Custom URL</option></select></div>
      <div class="field"><label>Model</label><input type="text" id="modelName" placeholder="gpt-4o-mini"></div>
    </div>
    <div class="field"><label id="apiKeyLabel">API Key</label><input type="password" id="apiKey" placeholder="sk-..."></div>
    <div class="custom-url-row" id="secretKeyRow"><div class="field"><label>AWS Secret Key</label><input type="password" id="awsSecretKey" placeholder="your-aws-secret-access-key"></div></div>
    <div class="custom-url-row" id="customUrlRow"><div class="field"><label>Base URL</label><input type="text" id="customUrl" placeholder="https://api.example.com/v1"></div></div>
    <div class="custom-url-row" id="bedrockRow"><div class="field"><label>AWS Region</label><input type="text" id="bedrockRegion" placeholder="us-east-1" value="us-east-1"></div></div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="clear-btn" onclick="clearChat()">Clear chat</button>
      <button class="clear-btn" onclick="resetAll()" style="border-color:var(--muted);color:var(--muted);">Reset everything</button>
    </div>
  </div>

  <div class="profile-card" id="profileCard" style="display:none;">
    <div class="profile-header" onclick="toggleProfileBody()">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div style="min-width:0;flex:1;">
        <div class="name" id="profileName">Her</div>
        <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="profileOneLiner">Tap to see profile</div>
      </div>
      <div class="style-badge" id="styleBadge">analyzing...</div>
    </div>
    <div class="profile-body" id="profileBody">
      <div id="profileTraits"></div>
      <div id="profileFacts"></div>
      <div class="profile-tags" id="profileTags"></div>
      <button class="btn btn-secondary btn-full" style="margin-top:10px;font-size:12px;" onclick="openOnboarding()">Edit profile</button>
    </div>
  </div>

  <div class="chat-card">
    <div class="chat-history" id="chatHistory"></div>
    <div class="input-area">
      <div class="sender-toggle">
        <button class="sender-btn active-her" id="btnHer" onclick="setSender('her')">Her message</button>
        <button class="sender-btn" id="btnYou" onclick="setSender('you')">Your message</button>
      </div>
      <div class="input-row">
        <textarea id="msgInput" placeholder="Paste her message here..." rows="1"></textarea>
        <button class="send-btn" onclick="addMessage()">&#8593;</button>
      </div>
      <div class="actions" id="actionBtns">
        <button class="action-btn suggest" id="btnSuggest" onclick="getSuggestions()">&#128161; Suggest</button>
        <button class="action-btn redflag" id="btnRedFlag" onclick="checkRedFlags()">&#127987; Red flags</button>
        <button class="action-btn rewrite" id="btnRewrite" onclick="rewriteMessage()">&#9998; Rewrite</button>
      </div>
    </div>
  </div>

  <div class="ai-panel" id="aiPanel"></div>
</div>

<div class="modal-overlay" id="onboardingModal">
  <div class="modal">
    <button class="modal-close" onclick="closeOnboarding()" title="Close">&times;</button>
    <div id="onboardStep1">
      <h2>Tell me about her</h2>
      <p class="subtitle">Dump everything you know — name, personality, interests, how she texts, what she's into. The more detail, the better the AI adapts.</p>
      <div class="field"><label>Her name</label><input type="text" id="obName" placeholder="e.g. Sarah"></div>
      <div class="field">
        <label>Everything you know about her</label>
        <textarea id="obDetails" placeholder="e.g. She's 23, works as a graphic designer, has a golden retriever named Bruno, loves anime and coffee, texts with lots of emojis, takes time to reply, seems shy at first but opens up with humor, likes when I'm direct but not pushy..." style="min-height:150px;"></textarea>
      </div>
      <div class="field">
        <label>Paste some of her recent messages (optional but helps a lot)</label>
        <textarea id="obMessages" placeholder="Paste a few of her actual messages so I can analyze her texting style..." style="min-height:80px;"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary btn-full" id="btnAnalyze" onclick="analyzeProfile()">Analyze her</button>
      </div>
      <div id="obLoading" style="display:none;" class="loading">Building psychological profile<span class="dots"></span></div>
    </div>
    <div id="onboardStep2" style="display:none;">
      <h2>Profile ready</h2>
      <p class="subtitle" id="obSummary"></p>
      <div id="obProfilePreview" style="margin:12px 0;"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="backToStep1()">Back</button>
        <button class="btn btn-primary" style="flex:1;" onclick="confirmProfile()">Looks good, start chatting</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== STATE ====================
let sender = 'her';
let messages = [];
let summary = '';
let herProfile = null;
let rawProfileInput = '';
let isAiBusy = false;
let isCompressing = false;
let isExtracting = false;

// Multi-profile state
let profiles = {};       // { id: { name, messages, summary, herProfile, rawProfileInput } }
let activeProfileId = null;

const MAX_RECENT = 8;
const SUMMARY_TRIGGER = 12;
const MIN_MSG_FOR_EXTRACTION = 15;

const PROVIDERS = {
  openai: { url: 'https://api.openai.com/v1/chat/completions', model: 'gpt-4o-mini' },
  deepseek: { url: 'https://api.deepseek.com/v1/chat/completions', model: 'deepseek-chat' },
  claude: { url: 'https://api.anthropic.com/v1/messages', model: 'claude-opus-4-8' },
  bedrock: { url: '', model: 'anthropic.claude-opus-4-8-v1' },
};

// ==================== INIT ====================
window.addEventListener('DOMContentLoaded', () => {
  loadState();
  renderChat();
  renderProfileCard();
  document.getElementById('provider').addEventListener('change', onProviderChange);
  ['apiKey','modelName','customUrl','bedrockRegion','awsSecretKey'].forEach(id =>
    document.getElementById(id).addEventListener('change', saveState)
  );
  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addMessage(); }
  });
  document.getElementById('msgInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 110) + 'px';
  });
  onProviderChange();
  updateHeaderSub();
  if (!herProfile) setTimeout(() => openOnboarding(), 300);
});

// ==================== UI CONTROLS ====================
function toggleSettings() {
  const el = document.getElementById('settingsPanel');
  el.classList.toggle('show');
  document.getElementById('btnSettings').classList.toggle('active', el.classList.contains('show'));
}

function handleProfileBtn() {
  if (!herProfile) {
    openOnboarding();
    return;
  }
  toggleProfileBody();
}

function toggleProfileBody() {
  const el = document.getElementById('profileBody');
  el.classList.toggle('show');
  document.getElementById('btnProfile').classList.toggle('active', el.classList.contains('show'));
}

function onProviderChange() {
  const p = document.getElementById('provider').value;
  document.getElementById('customUrlRow').className = 'custom-url-row' + (p === 'custom' ? ' show' : '');
  document.getElementById('bedrockRow').className = 'custom-url-row' + (p === 'bedrock' ? ' show' : '');
  document.getElementById('secretKeyRow').className = 'custom-url-row' + (p === 'bedrock' ? ' show' : '');
  if (PROVIDERS[p]) document.getElementById('modelName').placeholder = PROVIDERS[p].model;
  // Update labels for Bedrock
  const label = document.getElementById('apiKeyLabel');
  if (p === 'bedrock') {
    label.textContent = 'AWS Access Key ID';
    document.getElementById('apiKey').placeholder = 'AKIA...';
  } else if (p === 'claude') {
    label.textContent = 'Anthropic API Key';
    document.getElementById('apiKey').placeholder = 'sk-ant-...';
  } else {
    label.textContent = 'API Key';
    document.getElementById('apiKey').placeholder = 'sk-...';
  }
  saveState();
}

function updateHeaderSub() {
  const n = herProfile?.name;
  document.getElementById('headerSub').textContent = n ? 'Chatting with ' + n : 'Your dating wingman AI';
}

function setActionButtonsDisabled(disabled) {
  document.getElementById('btnSuggest').disabled = disabled;
  document.getElementById('btnRedFlag').disabled = disabled;
  document.getElementById('btnRewrite').disabled = disabled;
}

// ==================== ONBOARDING ====================
function openOnboarding() {
  document.getElementById('onboardStep1').style.display = 'block';
  document.getElementById('onboardStep2').style.display = 'none';
  document.getElementById('obLoading').style.display = 'none';
  document.getElementById('btnAnalyze').disabled = false;
  if (herProfile) {
    document.getElementById('obName').value = herProfile.name || '';

// ==================== MESSAGES ====================
function addMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  messages.push({ role: sender, text, time });
  input.value = '';
  input.style.height = 'auto';
  renderChat();
  saveState();

  // Background tasks (non-blocking, sequential)
  if (sender === 'her' && herProfile && text.length >= MIN_MSG_FOR_EXTRACTION) {
    scheduleBackgroundTasks(text);
  } else if (messages.length > SUMMARY_TRIGGER) {
    compressHistory();
  }
}

async function scheduleBackgroundTasks(msgText) {
  // Extract facts first, then compress if needed — never in parallel
  await extractNewFacts(msgText);
  if (messages.length > SUMMARY_TRIGGER) {
    await compressHistory();
  }
}

function renderChat() {
  const el = document.getElementById('chatHistory');
  el.innerHTML = '';
  if (summary) {
    const sys = document.createElement('div');
    sys.className = 'msg system';
    sys.textContent = 'Earlier conversation summarized';
    el.appendChild(sys);
  }
  const name = herProfile?.name || 'Her';
  messages.forEach((m, idx) => {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    const textNode = document.createElement('span');
    textNode.textContent = m.text;
    div.appendChild(textNode);
    const timeDiv = document.createElement('div');
    timeDiv.className = 'msg-time';
    timeDiv.textContent = (m.role === 'her' ? name : 'You') + ' · ' + m.time;
    div.appendChild(timeDiv);
    // Long-press to delete
    let holdTimer;
    div.addEventListener('contextmenu', e => { e.preventDefault(); deleteMessage(idx); });
    div.addEventListener('touchstart', () => { holdTimer = setTimeout(() => deleteMessage(idx), 600); }, {passive:true});
    div.addEventListener('touchend', () => clearTimeout(holdTimer));
    div.addEventListener('touchmove', () => clearTimeout(holdTimer));
    el.appendChild(div);
  });
  el.scrollTop = el.scrollHeight;
}

// ==================== SMART MEMORY ====================
async function extractNewFacts(msgText) {
  if (!herProfile || isExtracting) return;
  isExtracting = true;
  try {
    const knownFacts = (herProfile.key_facts || []).join('; ');
    const resp = await callAI([
      { role: 'system', content: 'Extract NEW strategic intel from this message that is NOT already known. Return ONLY valid JSON: {"new_facts":["fact1","fact2"]}. If nothing new, return {"new_facts":[]}. Extract: concrete facts (names, people, places, preferences, events, schedule), emotional signals (what excites her, triggers her, bothers her), relationship intel (mentions of exes, other guys, relationship views, dealbreakers), callback material (inside jokes forming, unique phrases she uses, shared moments), vulnerability markers (fears, insecurities, dreams she shares — handle with care but remember). Be selective but catch anything that gives strategic advantage.' },
      { role: 'user', content: 'Known facts: ' + knownFacts + '\n\nNew message from ' + (herProfile.name || 'Her') + ': "' + msgText + '"' }
    ], 100);
    const parsed = parseJSON(resp);
    if (parsed && Array.isArray(parsed.new_facts) && parsed.new_facts.length) {
      if (!herProfile.key_facts) herProfile.key_facts = [];
      parsed.new_facts.forEach(f => {
        if (typeof f === 'string' && f.trim() && !herProfile.key_facts.includes(f.trim())) {
          herProfile.key_facts.push(f.trim());
        }
      });
      saveState();
      renderProfileCard();
    }
  } catch(e) { /* silent background task */ }
  isExtracting = false;
}

async function compressHistory() {
  if (messages.length <= MAX_RECENT || isCompressing) return;
  isCompressing = true;
  const older = messages.slice(0, messages.length - MAX_RECENT);
  const recent = messages.slice(messages.length - MAX_RECENT);
  const name = herProfile?.name || 'Her';
  const convo = older.map(m => (m.role === 'her' ? name : 'You') + ' (' + m.time + '): ' + m.text).join('\n');
  const prev = summary ? 'Previous summary: ' + summary + '\n\n' : '';
  try {
    const resp = await callAI([
      { role: 'system', content: 'Compress this dating conversation into a strategic intelligence brief. Focus on: emotional arc (what highs/lows happened), power dynamic shifts (who chased, who pulled back), tests she ran and whether he passed, inside jokes forming, flirty moments and escalation points, open loops left dangling, plans or future projections made, any mistakes he made (over-investing, being too available, killing tension). Max 120 words. Do NOT repeat personal facts. Prioritize: callbacks he can reference, frame to maintain, and momentum to build on.' },
      { role: 'user', content: prev + 'New messages to compress:\n' + convo }
    ], 120);
    if (resp && resp !== 'No response') {
      summary = resp;
      messages = recent;
      saveState();
      renderChat();
    }
  } catch(e) { /* silent */ }
  isCompressing = false;
}

// ==================== BUILD AI CONTEXT ====================
function buildContext() {
  const name = herProfile?.name || 'Her';
  let ctx = '';

  if (herProfile) {
    const facts = (herProfile.key_facts || []);
    if (facts.length) ctx += '[Callbacks]: ' + facts.slice(-10).join('; ') + '\n';
  }

  if (summary) ctx += '[Earlier conversation]: ' + summary + '\n\n';

  let herMsgs = 0, hisMsgs = 0, herChars = 0, hisChars = 0;
  messages.forEach(m => {
    if (m.role === 'her') { herMsgs++; herChars += m.text.length; }
    else { hisMsgs++; hisChars += m.text.length; }
  });
  if (messages.length >= 4) {
    ctx += '[Investment balance]: ';
    if (hisChars > herChars * 1.4) ctx += 'He is investing MORE than her — pull back slightly.\n';
    else if (herChars > hisChars * 1.4) ctx += 'She is investing more — good position, maintain light scarcity.\n';
    else ctx += 'Balanced investment.\n';
  }

  // Conversation stage detection
  const totalMsgs = messages.length + (summary ? 10 : 0); // estimate compressed msgs
  let stage = 'early';
  if (totalMsgs > 30) stage = 'comfort';
  else if (totalMsgs > 15) stage = 'building';
  const lastHerIdx = messages.map((m,i) => m.role === 'her' ? i : -1).filter(i => i >= 0);
  const lastHisIdx = messages.map((m,i) => m.role === 'you' ? i : -1).filter(i => i >= 0);
  ctx += '[Stage]: ' + stage + ' game\n';

  // Double-text detection
  if (messages.length >= 2) {
    const last = messages[messages.length - 1];
    const prev = messages[messages.length - 2];
    if (last.role === 'you' && prev.role === 'you') {
      ctx += '[WARNING]: He already double-texted. DO NOT suggest another message unless she replies. If she ghosted, suggest patience or a pattern-interrupt after 24-48hrs.\n';
    }
  }

  // Response energy tracking
  if (messages.length >= 6) {
    const recent4 = messages.slice(-4);
    const herRecent = recent4.filter(m => m.role === 'her');
    const hisRecent = recent4.filter(m => m.role === 'you');
    const herAvgLen = herRecent.length ? herRecent.reduce((a,m) => a + m.text.length, 0) / herRecent.length : 0;
    const hisAvgLen = hisRecent.length ? hisRecent.reduce((a,m) => a + m.text.length, 0) / hisRecent.length : 0;
    if (herRecent.length && herAvgLen < 20) ctx += '[Alert]: Her messages are getting SHORT — she may be losing interest or busy. Change energy.\n';
    if (herRecent.length && herAvgLen > hisAvgLen * 1.5) ctx += '[Signal]: She is writing MORE than him — high interest. Maintain slight scarcity.\n';
  }

  // Date-ready detection
  if (stage !== 'early' && messages.length >= 8) {
    const recentText = messages.slice(-6).map(m => m.text.toLowerCase()).join(' ');
    const dateSignals = ['meet', 'hang', 'coffee', 'dinner', 'drink', 'plans', 'free', 'weekend', 'tomorrow', 'tonight', 'come over', 'see you', 'let\'s go', 'fun to', 'we should', 'miss you', 'wish you were'];
    const hits = dateSignals.filter(s => recentText.includes(s));
    if (hits.length >= 2) ctx += '[OPPORTUNITY]: Date signals detected (' + hits.join(', ') + '). Consider suggesting a meetup — timing is good.\n';
  }

  ctx += '[Recent messages]:\n';
  messages.forEach(m => {
    ctx += (m.role === 'her' ? name : 'You') + ' (' + m.time + '): ' + m.text + '\n';
  });

  return ctx;
}

    base += '\n- If she is TESTING you (being cold, provocative, mentioning other guys, late replies) — your suggestions should PASS the test. Never get defensive. Options: agree & amplify, playfully ignore, flip the frame.';
    base += '\n- If the context says OPPORTUNITY for a date — at least one option should smoothly move toward meeting up';
    base += '\n- If WARNING about double-text — suggest waiting instead, or a high-value pattern interrupt for later';

  } else if (task === 'rephrase') {

    base += '\n- If his draft is too long, tighten it. Less is more.';
    base += '\n- Output must sound like a real human texting. Casual, lowercase ok, no AI language. Think phone keyboard not essay.';
  } else if (task === 'redflags') {
    base += '\n\n=== TASK: RED FLAG ANALYSIS ===';
    base += '\nAnalyze the conversation like a dating strategist reading every subtext. Format each flag on its own line starting with exactly "RED FLAG:" or "GREEN FLAG:" followed by description.';
    base += '\nAnalyze ALL of these:';
    base += '\n- TESTS: Is she testing him? (compliance tests, jealousy plays, response time games, "my ex..." mentions, hot/cold behavior, deliberately provocative statements). Did he pass or fail?';
    base += '\n- INTEREST LEVEL: Real interest vs. just being polite. Look for: question-asking from her, emoji escalation, length of responses, personal details shared, response speed patterns';

    base += '\n- INVESTMENT: Is she emotionally investing (sharing feelings, being vulnerable, asking about his life)?';
    base += '\n- ATTRACTION SIGNALS: Playful teasing from her, future references, personal questions, "we" language, laugh reactions';
    base += '\n- WARNING SIGNS: Breadcrumbing (keeps him around but never commits), orbiting, using him for validation, mentioning other guys to create jealousy';
    base += '\n- HIS MISTAKES: Did he over-invest, double-text, get too available, miss a tease opportunity, kill the vibe, get friendzoned?';
    base += '\nEnd with "OVERALL:" — strategic assessment of where he stands (she is into him / warming up / losing interest / just being polite / testing him) and exactly what to do next.';
  }

  return base;
}

// ==================== API ====================
async function callAI(msgs, maxTokens) {
  const provider = document.getElementById('provider').value;
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) throw new Error('Add your API key in settings (gear icon)');
  const model = document.getElementById('modelName').value.trim() || PROVIDERS[provider]?.model || 'default';

  // Route to appropriate API format
  if (provider === 'claude') {
    return callClaude(apiKey, model, msgs, maxTokens);
  } else if (provider === 'bedrock') {
    return callBedrock(apiKey, model, msgs, maxTokens);
  }

  let url;
  if (provider === 'custom') {
    url = document.getElementById('customUrl').value.trim();
    if (!url) throw new Error('Enter base URL in settings');
    url = url.replace(/\/+$/, '') + '/chat/completions';
  } else {
    url = PROVIDERS[provider].url;
  }

  let resp;
  try {
    resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model: model, messages: msgs, max_completion_tokens: maxTokens, temperature: 0.75 })
    });
  } catch(e) {
    throw new Error('Network error — check your connection and API URL');
  }

  if (!resp.ok) {
    let errMsg = 'API error ' + resp.status;
    try { const err = await resp.json(); if (err.error?.message) errMsg = err.error.message; } catch(e) {}
    throw new Error(errMsg);
  }

  let data;
  try { data = await resp.json(); } catch(e) { throw new Error('Invalid response from API'); }
  const content = data.choices?.[0]?.message?.content;
  if (!content) throw new Error('Empty response from API');
  return content;
}

async function callClaude(apiKey, model, msgs, maxTokens) {
  // Convert OpenAI format to Claude Messages API format
  let system = '';
  const claudeMsgs = [];
  msgs.forEach(m => {
    if (m.role === 'system') { system += (system ? '\n\n' : '') + m.content; }
    else { claudeMsgs.push({ role: m.role, content: m.content }); }
  });
  // Ensure alternating user/assistant and starts with user
  if (!claudeMsgs.length || claudeMsgs[0].role !== 'user') {
    claudeMsgs.unshift({ role: 'user', content: 'Analyze and respond.' });
  }

  let resp;
  try {
    resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model, max_tokens: maxTokens, system: system || undefined, messages: claudeMsgs, temperature: 0.75 })
    });
  } catch(e) { throw new Error('Network error — check connection'); }

  if (!resp.ok) {
    let errMsg = 'Claude API error ' + resp.status;
    try { const err = await resp.json(); if (err.error?.message) errMsg = err.error.message; } catch(e) {}
    throw new Error(errMsg);
  }

  const data = await resp.json();
  const text = data.content?.[0]?.text;
  if (!text) throw new Error('Empty response from Claude');
  return text;
}

async function callBedrock(accessKeyId, model, msgs, maxTokens) {
  const secretKey = document.getElementById('awsSecretKey').value.trim();
  const region = document.getElementById('bedrockRegion').value.trim() || 'us-east-1';
  if (!secretKey) throw new Error('Enter your AWS Secret Key in settings');
  if (!accessKeyId) throw new Error('Enter your AWS Access Key ID in settings');

  // Convert to Claude Messages format
  let systemText = '';
  const claudeMsgs = [];
  msgs.forEach(m => {
    if (m.role === 'system') { systemText += (systemText ? '\n\n' : '') + m.content; }
    else { claudeMsgs.push({ role: m.role, content: m.content }); }
  });
  if (!claudeMsgs.length || claudeMsgs[0].role !== 'user') {
    claudeMsgs.unshift({ role: 'user', content: 'Analyze and respond.' });
  }

  const body = JSON.stringify({
    anthropic_version: 'bedrock-2023-05-31',
    max_tokens: maxTokens,
    system: systemText || undefined,
    messages: claudeMsgs,
    temperature: 0.75
  });

  const host = 'bedrock-runtime.' + region + '.amazonaws.com';
  const path = '/model/' + encodeURIComponent(model) + '/invoke';
  const url = 'https://' + host + path;

  // AWS SigV4 signing
  const now = new Date();
  const amzDate = now.toISOString().replace(/[:-]|\.\d{3}/g, '');
  const dateStamp = amzDate.slice(0, 8);
  const service = 'bedrock';
  const scope = dateStamp + '/' + region + '/' + service + '/aws4_request';

  // Hash payload
  const payloadHash = await sha256Hex(body);

  // Canonical request
  const canonical = 'POST\n' + path + '\n\n' +
    'content-type:application/json\n' +
    'host:' + host + '\n' +
    'x-amz-date:' + amzDate + '\n\n' +
    'content-type;host;x-amz-date\n' + payloadHash;

  const canonicalHash = await sha256Hex(canonical);

  // String to sign
  const stringToSign = 'AWS4-HMAC-SHA256\n' + amzDate + '\n' + scope + '\n' + canonicalHash;

  // Signing key
  const kDate = await hmacSha256(new TextEncoder().encode('AWS4' + secretKey), dateStamp);
  const kRegion = await hmacSha256(kDate, region);
  const kService = await hmacSha256(kRegion, service);
  const kSigning = await hmacSha256(kService, 'aws4_request');

  // Signature
  const sigBytes = await hmacSha256(kSigning, stringToSign);
  const signature = Array.from(new Uint8Array(sigBytes)).map(b => b.toString(16).padStart(2, '0')).join('');

  const authHeader = 'AWS4-HMAC-SHA256 Credential=' + accessKeyId + '/' + scope +
    ', SignedHeaders=content-type;host;x-amz-date, Signature=' + signature;

  let resp;
  try {
    resp = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Host': host,
        'X-Amz-Date': amzDate,
        'Authorization': authHeader
      },
      body: body
    });
  } catch(e) { throw new Error('Network error — check your AWS region and credentials'); }

  if (!resp.ok) {
    let errMsg = 'Bedrock error ' + resp.status;
    try { const err = await resp.json(); errMsg = err.message || err.Message || errMsg; } catch(e) {}
    throw new Error(errMsg);
  }

  const data = await resp.json();
  const text = data.content?.[0]?.text;
  if (!text) throw new Error('Empty response from Bedrock');
  return text;
}

// AWS SigV4 crypto helpers using Web Crypto API
async function sha256Hex(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function hmacSha256(keyData, message) {
  const keyBuffer = (keyData instanceof ArrayBuffer) ? keyData : new TextEncoder().encode(keyData);
  const key = await crypto.subtle.importKey('raw', keyBuffer, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
  return await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(message));
}

// ==================== RENDER AI RESPONSES ====================
function showLoading(text) {
  const p = document.getElementById('aiPanel');
  p.innerHTML = '<div class="loading">' + escHtml(text) + '<span class="dots"></span></div>';
  p.className = 'ai-panel show';
}

function showSuggestions(text, isRewrite) {
  const panel = document.getElementById('aiPanel');
  panel.innerHTML = '';
  const header = document.createElement('div');
  header.className = 'ai-panel-header';
  header.textContent = isRewrite ? 'Rephrased versions' : 'Reply suggestions';
  panel.appendChild(header);

  const items = parseSuggestions(text);

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'ai-suggestion';

    const labelDiv = document.createElement('div');
    labelDiv.className = 'label';
    labelDiv.textContent = item.label;
    div.appendChild(labelDiv);
    if (item.isTiming) {
      div.style.background = 'var(--surface2)';
      div.style.borderColor = 'var(--accent-light)';
      div.style.cursor = 'default';
    }

    const textDiv = document.createElement('div');
    textDiv.textContent = item.text;
    div.appendChild(textDiv);

    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = 'Copy';
    copyBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      copyToClipboard(item.text, this);
    });
    div.appendChild(copyBtn);

    div.addEventListener('click', function() {
      document.getElementById('msgInput').value = item.text;
      setSender('you');
      toast('Loaded — edit & send');
    });

    panel.appendChild(div);
  });
  panel.className = 'ai-panel show';
}

function showRedFlags(text) {
  const panel = document.getElementById('aiPanel');
  panel.innerHTML = '';
  const header = document.createElement('div');
  header.className = 'ai-panel-header';
  header.textContent = 'Flag analysis';
  panel.appendChild(header);

  text.split('\n').filter(l => l.trim()).forEach(line => {
    const div = document.createElement('div');
    const trimmed = line.trim();
    // Use strict prefix matching instead of substring search
    if (trimmed.match(/^(RED FLAG|RED:|🚩)/i)) {
      div.className = 'red-flag-item warn';
    } else if (trimmed.match(/^(GREEN FLAG|GREEN:|✅)/i)) {
      div.className = 'red-flag-item ok';
    } else {
      div.className = 'red-flag-item neutral';
    }
    div.textContent = trimmed;
    panel.appendChild(div);
  });
  panel.className = 'ai-panel show';
}

function showError(msg) {
  const p = document.getElementById('aiPanel');
  p.innerHTML = '';
  const div = document.createElement('div');
  div.style.cssText = 'color:var(--red);padding:12px;font-size:13px;';
  div.textContent = '⚠ ' + msg;
  p.appendChild(div);
  p.className = 'ai-panel show';
}

// ==================== PERSISTENCE ====================
function saveState() {
  try {
    // Save current profile data back to profiles object
    if (activeProfileId && profiles[activeProfileId]) {
      profiles[activeProfileId].messages = messages;
      profiles[activeProfileId].summary = summary;
      profiles[activeProfileId].herProfile = herProfile;
      profiles[activeProfileId].rawProfileInput = rawProfileInput;
    }
    localStorage.setItem('rizz_v3', JSON.stringify({
      profiles: profiles,
      activeProfileId: activeProfileId,
      provider: document.getElementById('provider').value,
      apiKey: document.getElementById('apiKey').value,
      model: document.getElementById('modelName').value,
      customUrl: document.getElementById('customUrl').value,
      bedrockRegion: document.getElementById('bedrockRegion').value,
      awsSecretKey: document.getElementById('awsSecretKey').value
    }));
  } catch(e) {
    console.warn('Failed to save state:', e);
  }
}

function loadState() {
  try {
    // Try v3 (multi-profile) first
    const raw = localStorage.getItem('rizz_v3');
    if (raw) {
      const s = JSON.parse(raw);
      profiles = s.profiles && typeof s.profiles === 'object' ? s.profiles : {};
      activeProfileId = s.activeProfileId || null;
      if (s.provider) document.getElementById('provider').value = s.provider;
      if (s.apiKey) document.getElementById('apiKey').value = s.apiKey;
      if (s.model) document.getElementById('modelName').value = s.model;
      if (s.customUrl) document.getElementById('customUrl').value = s.customUrl;
      if (s.bedrockRegion) document.getElementById('bedrockRegion').value = s.bedrockRegion;
      if (s.awsSecretKey) document.getElementById('awsSecretKey').value = s.awsSecretKey;
      // Load active profile into working state
      if (activeProfileId && profiles[activeProfileId]) {
        const p = profiles[activeProfileId];
        messages = Array.isArray(p.messages) ? p.messages : [];
        summary = typeof p.summary === 'string' ? p.summary : '';
        herProfile = p.herProfile && typeof p.herProfile === 'object' ? p.herProfile : null;
        rawProfileInput = typeof p.rawProfileInput === 'string' ? p.rawProfileInput : '';
      }
      renderSwitcher();
      return;
    }
    // Migrate from v2 (single profile)
    const rawV2 = localStorage.getItem('rizz_v2');
    if (rawV2) {
      const s = JSON.parse(rawV2);
      messages = Array.isArray(s.messages) ? s.messages : [];
      summary = typeof s.summary === 'string' ? s.summary : '';
      herProfile = s.herProfile && typeof s.herProfile === 'object' ? s.herProfile : null;
      rawProfileInput = typeof s.rawProfileInput === 'string' ? s.rawProfileInput : '';
      if (s.provider) document.getElementById('provider').value = s.provider;
      if (s.apiKey) document.getElementById('apiKey').value = s.apiKey;
      if (s.model) document.getElementById('modelName').value = s.model;
      if (s.customUrl) document.getElementById('customUrl').value = s.customUrl;
      // Migrate to v3
      if (herProfile) {
        const id = 'p_' + Date.now();
        profiles[id] = { name: herProfile.name || 'Her', messages, summary, herProfile, rawProfileInput };
        activeProfileId = id;
      }
      localStorage.removeItem('rizz_v2');
      saveState();
      renderSwitcher();
      return;
    }
  } catch(e) {
    console.warn('Failed to load state:', e);
  }
  renderSwitcher();
}

function clearChat() {
  if (!confirm('Clear all messages?')) return;
  messages = [];
  summary = '';
  saveState();
  renderChat();
  document.getElementById('aiPanel').className = 'ai-panel';
  toast('Chat cleared');
}

function resetAll() {
  if (!confirm('Reset EVERYTHING including all profiles?')) return;
  messages = [];
  summary = '';
  herProfile = null;
  rawProfileInput = '';
  profiles = {};
  activeProfileId = null;
  localStorage.removeItem('rizz_v3');
  localStorage.removeItem('rizz_v2');

}

// ==================== MULTI-PROFILE ====================
function renderSwitcher() {
  const switcher = document.getElementById('profileSwitcher');
  const select = document.getElementById('profileSelect');
  const ids = Object.keys(profiles);
  if (ids.length === 0) {
    switcher.style.display = 'none';
    return;
  }
  switcher.style.display = 'flex';
  select.innerHTML = '';
  ids.forEach(id => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = profiles[id].name || 'Unknown';
    if (id === activeProfileId) opt.selected = true;
    select.appendChild(opt);
  });
}

function switchProfile() {
  const select = document.getElementById('profileSelect');
  const newId = select.value;
  if (newId === activeProfileId) return;
  // Save current before switching
  saveState();
  // Load new profile
  activeProfileId = newId;
  const p = profiles[newId];
  messages = Array.isArray(p.messages) ? p.messages : [];
  summary = typeof p.summary === 'string' ? p.summary : '';
  herProfile = p.herProfile && typeof p.herProfile === 'object' ? p.herProfile : null;
  rawProfileInput = typeof p.rawProfileInput === 'string' ? p.rawProfileInput : '';
  saveState();
  renderChat();
  renderProfileCard();
  document.getElementById('aiPanel').className = 'ai-panel';
  toast('Switched to ' + (herProfile?.name || 'Unknown'));
}

function addNewProfile() {
  // Save current first
  if (activeProfileId) saveState();
  // Reset working state
  messages = [];
  summary = '';
  herProfile = null;
  rawProfileInput = '';
  activeProfileId = null;
  renderChat();
  renderProfileCard();
  document.getElementById('aiPanel').className = 'ai-panel';
  // Open onboarding
  openOnboarding();
}

function deleteCurrentProfile() {
  if (!activeProfileId) return;
  const name = profiles[activeProfileId]?.name || 'this profile';
  if (!confirm('Delete ' + name + ' and all her conversation history?')) return;
  delete profiles[activeProfileId];
  const ids = Object.keys(profiles);
  if (ids.length > 0) {
    activeProfileId = ids[0];
    const p = profiles[activeProfileId];
    messages = Array.isArray(p.messages) ? p.messages : [];
    summary = typeof p.summary === 'string' ? p.summary : '';
    herProfile = p.herProfile && typeof p.herProfile === 'object' ? p.herProfile : null;
    rawProfileInput = typeof p.rawProfileInput === 'string' ? p.rawProfileInput : '';
  } else {
    activeProfileId = null;
    messages = [];
    summary = '';
    herProfile = null;
    rawProfileInput = '';
  }
  saveState();
  renderSwitcher();
  renderChat();
  renderProfileCard();
  document.getElementById('aiPanel').className = 'ai-panel';
  toast('Deleted ' + name);
}

// ==================== UTILITIES ====================
function escHtml(s) {
  if (typeof s !== 'string') return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function safeGet(obj) {
  let current = obj;
  for (let i = 1; i < arguments.length; i++) {
    if (current == null || typeof current !== 'object') return undefined;
    current = current[arguments[i]];
  }
  return current;
}

function parseJSON(text) {
  if (typeof text !== 'string') return null;
  // Try direct parse first
  try { return JSON.parse(text.trim()); } catch(e) {}
  // Strip markdown code fences
  const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenceMatch) {
    try { return JSON.parse(fenceMatch[1].trim()); } catch(e) {}
  }
  // Find the outermost balanced braces
  const start = text.indexOf('{');
  if (start === -1) return null;
  let depth = 0;
  let end = -1;
  for (let i = start; i < text.length; i++) {
    if (text[i] === '{') depth++;
    else if (text[i] === '}') { depth--; if (depth === 0) { end = i; break; } }
  }
  if (end === -1) return null;
  try { return JSON.parse(text.slice(start, end + 1)); } catch(e) { return null; }
}

function parseSuggestions(text) {
  const lines = text.split('\n');
  let current = null;
  const items = [];
  let timingAdvice = '';
  lines.forEach(function(line) {
    if (line.match(/^TIMING[:\s]/i)) {
      if (current && current.text) items.push(current);
      current = null;
      timingAdvice = line.replace(/^TIMING[:\s]*/i, '').trim();
    } else if (line.match(/^(OPTION \d|SMOOTH|PLAYFUL|DIRECT|BOLD|INTRIGUING|1\.|2\.|3\.)[:\s]*\(?/i)) {
      if (current && current.text) items.push(current);
      current = { label: line.replace(/[:\s]*$/, '').trim(), text: '' };
    } else if (current && line.trim()) {
      current.text += (current.text ? '\n' : '') + line.trim();
    }
  });
  if (current && current.text) items.push(current);
  if (!items.length) items.push({ label: 'Suggestion', text: text.trim() });
  // Append timing advice as a special item
  if (timingAdvice) items.push({ label: '⏰ Timing', text: timingAdvice, isTiming: true });
  return items;
}

function copyToClipboard(text, btnEl) {
  // Try modern API first, fallback for HTTP contexts
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(function() {
      showCopied(btnEl);
    }).catch(function() {
      fallbackCopy(text, btnEl);
    });
  } else {
    fallbackCopy(text, btnEl);
  }
}

function fallbackCopy(text, btnEl) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showCopied(btnEl);
  } catch(e) {
    toast('Copy failed — select text manually');
  }
  document.body.removeChild(ta);
}

function showCopied(btnEl) {
  if (!btnEl) return;
  btnEl.textContent = 'Copied!';
  btnEl.classList.add('copied');
  setTimeout(function() {
    btnEl.textContent = 'Copy';
    btnEl.classList.remove('copied');
  }, 1500);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function() { t.className = 'toast'; }, 2500);
}

// ==================== DARK MODE ====================
function toggleDarkMode() {
  document.documentElement.classList.toggle('dark');
  const isDark = document.documentElement.classList.contains('dark');
  localStorage.setItem('rizz_dark', isDark ? '1' : '0');
  document.getElementById('btnDark').classList.toggle('active', isDark);
}
// Auto-load dark mode preference
(function() {
  if (localStorage.getItem('rizz_dark') === '1') {
    document.documentElement.classList.add('dark');
    setTimeout(() => document.getElementById('btnDark')?.classList.add('active'), 0);
  }
})();

function deleteMessage(idx) {
  if (idx < 0 || idx >= messages.length) return;
  const m = messages[idx];
  if (!confirm('Delete this message?')) return;
  messages.splice(idx, 1);
  saveState();
  renderChat();
  toast('Message deleted');
}
